<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С Днём Рождения</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  overflow:hidden;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.card{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
  max-width:500px;
  animation:fadeIn 2s ease;
}

h1{
  color:#ff4d6d;
  font-size:40px;
  margin-bottom:20px;
}

p{
  font-size:20px;
  line-height:1.6;
  color:#333;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.heart{
  position:fixed;
  font-size:50px;
  top:-50px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

.hidden{
  display:none;
}

.final{
  margin-top:20px;
  font-style:italic;
  color:#ff4d6d;
  font-size:18px;
  animation:fadeIn 3s ease;
}

#gameArea{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
}

#score{
  position:fixed;
  top:10px;
  right:20px;
  font-size:24px;
  font-weight:bold;
  color:#ff4d6d;
}
</style>
</head>
<body>

<div class="card">
  <h1>С Днём Рождения Красавица 🎉</h1>
  <p id="text1">У меня есть для тебя маленькое пожелание.</p>
  <button id="btn" onclick="showMessage()">Нажми</button>
  <div id="message" class="hidden"></div>
  <button id="gameBtn" class="hidden" onclick="startGame()">Поймай поцелуи 💋</button>
</div>

<!-- Локальная музыка -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="gameArea"></div>
<div id="score" class="hidden">Очки: 0</div>

<script>
// Текст поздравления с расширенными пожеланиями
const lines = [
  "Поздравляю тебя с днём рождения!",
  "Ты очень особенный и дорогой человек.",
  "Желаю счастья, здоровья и улыбок каждый день.",
  "Пусть каждый день приносит радость и вдохновение.",
  "Пусть сбудутся все твои мечты и желания.",
  "Желаю море смеха, тепла и верных друзей рядом.",
  "Пусть удача сопровождает тебя во всех начинаниях.",
  "Не забывай радоваться мелочам и ценить моменты.",
  "Пусть каждый новый день будет ярче предыдущего.",
  "Спасибо, что ты есть в моей жизни ❤️",
  "This page was made specially for you"
];

let i = 0;
function showNextLine(){
  if(i < lines.length){
    const p = document.createElement("p");
    p.textContent = lines[i];
    p.style.animation = "fadeIn 1.5s ease";
    if(i === lines.length-1) p.className = "final";
    document.getElementById("message").appendChild(p);

    // Мини-анимация поцелуев для каждого пожелания
    createMiniKisses();

    i++;
    setTimeout(showNextLine, 2000);

    if(i === 3){
      document.getElementById("gameBtn").classList.remove("hidden");
    }
  }
}

function showMessage(){
  document.getElementById("message").classList.remove("hidden");
  document.getElementById("music").play();
  document.getElementById("btn").style.display="none";
  setInterval(createHeart,500); // фоновые сердца
  showNextLine();
}

// Фоновые сердца до начала игры
function createHeart(){
  const heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left = Math.random()*100+"vw";
  heart.style.animationDuration = (4 + Math.random()*2)+"s";
  document.body.appendChild(heart);
  setTimeout(()=> heart.remove(),6000);
}

// Мини-анимация поцелуев при каждом пожелании
function createMiniKisses(){
  for(let j = 0; j < 5; j++){
    const kiss = document.createElement("div");
    kiss.className = "heart";
    kiss.innerHTML = "💋";
    kiss.style.left = (Math.random() * 80 + 10) + "vw";
    kiss.style.fontSize = (20 + Math.random()*20) + "px";
    kiss.style.animationDuration = (3 + Math.random()*2) + "s";
    document.body.appendChild(kiss);
    setTimeout(()=> kiss.remove(), 5000);
  }
}

// ---- Мобильная мини-игра с падающими поцелуями ----
let score = 0;
function startGame(){
  const gameArea = document.getElementById("gameArea");
  const scoreDisplay = document.getElementById("score");
  score = 0;
  scoreDisplay.textContent = "Очки: 0";
  scoreDisplay.classList.remove("hidden");
  gameArea.style.pointerEvents="auto";

  // Тап по экрану = очко
  function tapHandler(){
    score++;
    scoreDisplay.textContent = "Очки: " + score;
  }
  document.body.addEventListener("touchstart", tapHandler);

  // Падающие поцелуи для игры
  const gameInterval = setInterval(()=>{
    const kiss = document.createElement("div");
    kiss.className = "heart";
    kiss.innerHTML = "💋";
    kiss.style.left = Math.random()*100+"vw";
    kiss.style.animationDuration = (4 + Math.random()*2)+"s";
    gameArea.appendChild(kiss);
    setTimeout(()=> kiss.remove(),6000);
  },700);

  // Игра 15 секунд
  setTimeout(()=>{
    clearInterval(gameInterval);
    document.body.removeEventListener("touchstart", tapHandler);
    alert("Когда увидемся буду должен " + score + " поцелуев 💋");
    gameArea.style.pointerEvents="none";
  },15000);
}
</script>
</body>
</html>
